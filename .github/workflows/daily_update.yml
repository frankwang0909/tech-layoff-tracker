name: Daily Layoff Data Update

on:
  # Run daily at 08:00 UTC (midnight PST / 1am PDT)
  schedule:
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Also run on push to main (for initial setup / testing)
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - 'analysis/**'
      - 'visualization/**'
      - 'main.py'
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run pipeline (Scrape → Process → Chart)
        run: python main.py

      - name: 📊 Verify outputs exist
        run: |
          echo "=== Checking generated files ==="
          ls -la data/raw/layoffs_raw.csv
          ls -la data/processed/*.json
          ls -la visualization/layoff_chart.html
          echo "=== Stats ==="
          cat data/processed/stats.json | python -m json.tool

      - name: 💾 Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ visualization/layoff_chart.html
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📊 Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  # Deploy dashboard to GitHub Pages
  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout (with latest data)
        uses: actions/checkout@v6
        with:
          ref: main  # Get the commit from update-data job

      - name: 🔄 Pull latest changes
        run: git pull origin main

      - name: 📁 Prepare Pages directory
        run: |
          mkdir -p _site
          cp visualization/layoff_chart.html _site/index.html
          cp -r data/processed _site/api
          # Create a simple redirect and health check
          echo '{"status":"ok","updated":"'"$(date -u '+%Y-%m-%dT%H:%M:%SZ')"'"}' > _site/api/health.json

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
